<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>바코드 검수기</title>
    <!-- PWA를 위한 매니페스트 설정 -->
    <link rel="manifest" href="manifest.json" />
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
      body {
        font-family: -apple-system, sans-serif;
        text-align: center;
        background: #f4f4f9;
        margin: 0;
        padding: 20px;
      }
      #reader {
        width: 100%;
        max-width: 500px; /* PC에서도 너무 커지지 않게 제한 */
        margin: auto;
        border-radius: 15px;
        overflow: hidden;
        border: 2px solid #3498db; /* 스캔 영역임을 강조 */
      }
      #reader__scan_region {
        background: rgba(255, 255, 255, 0.1);
      }
      .info-box {
        margin-top: 20px;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .count {
        font-size: 4rem;
        font-weight: bold;
        color: #2ecc71;
        margin: 10px 0;
      }
      .target {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 5px;
      }
      #target-text {
        font-weight: bold;
        color: #333;
      }
      #reset-btn {
        width: 100%;
        max-width: 400px;
        margin-top: 20px;
        padding: 15px;
        font-size: 1.1rem;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
      }
      /* 에러 발생 시 배경 반짝임 효과 */
      .error-bg {
        background: #ff4757 !important;
        transition: 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="reader"></div>

    <div class="info-box" id="display-card">
      <div class="target">기준: <span id="target-text">스캔 대기 중</span></div>
      <div class="count" id="count-view">0</div>
      <div style="color: #888">스캔 완료 수량</div>
    </div>

    <button id="reset-btn">새 바코드 스캔 (초기화)</button>

    <script>
      let targetBarcode = null;
      let count = 0;

      // 경고음 함수 (Web Audio API)
      function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine"; // 부드러운 경고음
        osc.frequency.setValueAtTime(440, ctx.currentTime); // 주파수 (Hz)
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1);
        osc.start();
        osc.stop(ctx.currentTime + 1);
      }

      function onScanSuccess(decodedText) {
        if (!targetBarcode) {
          targetBarcode = decodedText;
          document.getElementById("target-text").innerText = targetBarcode;
          count = 1;
          // 성공 시 진동 (모바일 지원 시)
          if (navigator.vibrate) navigator.vibrate(100);
        } else {
          if (decodedText === targetBarcode) {
            count++;
            if (navigator.vibrate) navigator.vibrate(50);
          } else {
            // 일치하지 않을 때: 소리 + 진동 + 배경색 변화
            playBeep();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            triggerVisualError();
          }
        }
        document.getElementById("count-view").innerText = count;
      }

      function triggerVisualError() {
        const card = document.getElementById("display-card");
        card.classList.add("error-bg");
        setTimeout(() => card.classList.remove("error-bg"), 500);
      }

      document.getElementById("reset-btn").onclick = () => {
        targetBarcode = null;
        count = 0;
        document.getElementById("target-text").innerText = "스캔 대기 중";
        document.getElementById("count-view").innerText = "0";
      };

      // 기존 코드: html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });

      // 수정된 코드: 가로 300px, 세로 150px의 직사각형 스캔 영역 설정
      const html5QrcodeScanner = new Html5QrcodeScanner("reader", {
        fps: 20, // 인식 속도를 위해 프레임 수를 조금 높임
        qrbox: { width: 300, height: 150 }, // 여기서 직사각형 크기 조절
        aspectRatio: 1.777778, // 16:9 비율로 카메라 화면 유지
      });

      html5QrcodeScanner.render(onScanSuccess);
    </script>
    <script src="javaScripts.js"></script>
  </body>
</html>
