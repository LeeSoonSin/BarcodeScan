<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>바코드 검수 매니저 (TC22 전용)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 실시간 인식 상태 표시줄 (TC22 스캔 상태) -->
    <div id="scan-status-bar">스캔 버튼을 눌러주세요</div>

    <!-- 스캐너 데이터를 받을 숨겨진 입력창 (항상 포커스 유지) -->
    <input type="text" id="barcode-input" autofocus autocomplete="off" style="position: absolute; opacity: 0; pointer-events: none;">

    <!-- 정보 표시 영역 (메인 UI) -->
    <div class="info-box" id="display-card">
        <div class="target">기준 품목: <span id="target-text">-</span></div>
        <div class="count" id="count-view">0</div>
        <div class="sub-text">누적 수량 합계</div>
    </div>

    <!-- 조작 버튼 영역 -->
    <div class="button-container">
        <!-- 물리 버튼 보조용 버튼 -->
        <button id="scan-trigger-btn">스캔 대기 중...</button>
        <button id="undo-btn"">직전 스캔 취소</button>
        <button id="reset-btn">데이터 초기화 (새 품목)</button>
    </div>

    <script src="javaScripts.js"></script>
</body>
</html>
