<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바코드 검수 매니저</title>
    <link rel="manifest" href="manifest.json">
    <!-- 바코드 스캐너 라이브러리 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- 외부 스타일시트 연결 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 카메라 영역 -->
    <div id="reader"></div>

    <!-- 실시간 인식 상태 표시줄 -->
    <div id="scan-status-bar">바코드를 비춰주세요...</div>

    <!-- 수동 스캔 버튼 -->
    <div class="button-container">
        <button id="scan-trigger-btn">스캔하기 (확인)</button>
    </div>

    <!-- 정보 표시 영역 -->
    <div class="info-box" id="display-card">
        <div class="target">기준 품목: <span id="target-text">-</span></div>
        <div class="count" id="count-view">0</div>
        <div class="sub-text">누적 수량 합계</div>
    </div>

    <!-- 초기화 버튼 -->
    <button id="reset-btn">데이터 초기화 (새 품목)</button>

    <!-- 외부 자바스크립트 연결 -->
    <script src="javaScripts.js"></script>
</body>
</html>
